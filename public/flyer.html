<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICEU Attend Flyer Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  background: #0a0a0a;
  color: white;
}

h1 {
  color: gold;
}

input {
  margin: 10px;
  padding: 10px;
}

canvas {
  margin-top: 20px;
  border-radius: 10px;
  box-shadow: 0 0 30px rgba(255,215,0,0.2);
}

.btn {
  padding: 12px 25px;
  margin-top: 20px;
  background: gold;
  color: black;
  border: none;
  cursor: pointer;
  border-radius: 30px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>I WILL BE ATTENDING</h1>

<!--<input type="text" id="nameInput" placeholder="Enter your name"><br>-->
<input type="file" id="imageInput" accept="image/*"><br>

<canvas id="flyerCanvas" width="800" height="1000"></canvas><br>

<button class="btn" id="downloadBtn">Download Flyer</button>

<script>
const imageInput = document.getElementById('imageInput');
const nameInput = document.getElementById('nameInput');
const canvas = document.getElementById('flyerCanvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');

// LOAD REAL ICEU BACKGROUND
const flyerTemplate = new Image();
flyerTemplate.src = "/images/ICEU-WITH BG.png"; 

flyerTemplate.onload = () => {
  ctx.drawImage(flyerTemplate, 0, 0, canvas.width, canvas.height);
};

// DRAW CIRCLE IMAGE
function drawCircularImage(img, x, y, size) {
  ctx.save();

  ctx.beginPath();
  ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();

  ctx.drawImage(img, x, y, size, size);
  ctx.restore();

  // GOLD BORDER
  ctx.beginPath();
  ctx.arc(x + size/2, y + size/2, size/2 + 5, 0, Math.PI * 2);
  ctx.strokeStyle = "gold";
  ctx.lineWidth = 6;
  ctx.stroke();
}

imageInput.addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function (event) {
    const userImage = new Image();

    userImage.onload = function () {

      // REDRAW BACKGROUND
      ctx.drawImage(flyerTemplate, 0, 0, canvas.width, canvas.height);

      // PROFILE IMAGE POSITION (adjust if needed)
      drawCircularImage(userImage, 250, 280, 300);

      // USER NAME
      const userName = nameInput.value || "Your Name";

      ctx.fillStyle = "white";
      ctx.font = "bold 36px Arial";
      ctx.textAlign = "center";
      ctx.fillText(userName, 400, 650);

      // ATTENDING TEXT
      ctx.fillStyle = "gold";
      ctx.font = "bold 42px Arial";
      ctx.fillText(" ", 400, 710);

      // SMALL FOOTER
      ctx.fillStyle = "#ddd";
      ctx.font = "22px Arial";
      ctx.fillText(" ", 400, 760);
    };

    userImage.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'ICEU-attending.png';
  link.href = canvas.toDataURL();
  link.click();
});
</script>

</body>
</html>
