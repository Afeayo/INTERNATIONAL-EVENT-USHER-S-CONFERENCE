<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    background: #111;
    padding: 25px;
    border-radius: 10px;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

h1 {
    color: gold;
}

.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    width: 80%;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.flyer {
    background: gold;
    color: black;
}

.home {
    background: #333;
    color: white;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Registration Successful</h1>

    <p>You're in! 🚀</p>
    <p>📩 Please check your email for important updates.</p>

    <button class="btn whatsapp" onclick="joinWhatsApp()">Join WhatsApp Group</button>
    <button class="btn flyer" onclick="goToFlyer()">Create Your Flyer</button>
    <button class="btn home" onclick="window.location.href='/'">Go Home</button>
</div>

<!-- MODAL -->
<div class="modal" id="popupModal">
    <div class="modal-content">
        <h2>⚡ Important Next Steps</h2>
        <p>Join our WhatsApp group and create your flyer now!</p>

        <button class="btn whatsapp" onclick="joinWhatsApp()">Join WhatsApp</button>
        <!--<button class="btn flyer" onclick="goToFlyer()">Create Flyer</button>-->
    </div>
</div>

<script>
// WhatsApp link
function joinWhatsApp() {
    window.open("https://chat.whatsapp.com/B8Rh0qa1LwRAVFxvFjZGtz", "_blank");
}

// Go to flyer page
function goToFlyer() {
    window.location.href = "/flyer.html"; // 👈 your flyer page
}

// SHOW MODAL AFTER 1 SECOND
setTimeout(() => {
    document.getElementById("popupModal").style.display = "flex";
}, 1000);

// CLOSE MODAL WHEN CLICK OUTSIDE
window.onclick = function(e) {
    const modal = document.getElementById("popupModal");
    if (e.target === modal) {
        modal.style.display = "none";
    }
};
</script>

</body>
</html>
